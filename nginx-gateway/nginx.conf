# Gateway reverso — routing por dominio (virtual host), no por path:
#   admin.brainmap.cl -> todo el tráfico va al contenedor de WordPress
#   cualquier otro host (dominio principal) -> contenedor del sitio Astro
#
# WordPress ya tiene siteurl/home seteados a https://admin.brainmap.cl,
# así que todos sus links internos (admin bar, login, wp-content,
# wp-includes, etc.) ya apuntan a ese subdominio — no hace falta
# path-matching especial para /wp-admin, /wp-login.php, etc. como en la
# versión anterior de este gateway.
#
# Ambos backends se referencian por su nombre de servicio en la red Docker
# de Easypanel (mismo patrón que brainmap_wordpress / brainmap_wordpress-db).
#
# 127.0.0.11 es el DNS embebido de Docker. Se usan variables en proxy_pass
# a propósito: así nginx resuelve el hostname en cada request en vez de una
# sola vez al arrancar, y no queda apuntando a una IP vieja si el contenedor
# se reinicia.
resolver 127.0.0.11 valid=10s;

# --- WordPress — admin.brainmap.cl -----------------------------------
server {
  listen 80;
  server_name admin.brainmap.cl;

  set $wordpress_upstream http://brainmap_wordpress:80;

  location / {
    proxy_pass $wordpress_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# --- Sitio Astro — cualquier otro dominio -----------------------------
server {
  listen 80 default_server;
  server_name _;

  set $astro_upstream http://brainmap-astro:3000;

  location / {
    proxy_pass $astro_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
