# Gateway reverso — un solo dominio público, dos backends internos:
#   /wp-admin/*, /wp-login.php, y los assets que el admin de WP necesita
#   para renderizar (wp-content, wp-includes) -> contenedor de WordPress
#   todo lo demás                                -> contenedor del sitio Astro
#
# Ambos backends se referencian por su nombre de servicio en la red Docker
# de Easypanel (mismo patrón que brainmap_wordpress / brainmap_wordpress-db).
#
# 127.0.0.11 es el DNS embebido de Docker. Se usan variables en proxy_pass
# a propósito: así nginx resuelve el hostname en cada request en vez de una
# sola vez al arrancar, y no queda apuntando a una IP vieja si el contenedor
# de WordPress se reinicia.
resolver 127.0.0.11 valid=10s;

server {
  listen 80;
  server_name _;

  set $wordpress_upstream http://brainmap_wordpress:80;
  set $astro_upstream http://brainmap-astro:3000;

  # --- WordPress admin ------------------------------------------------
  location /wp-admin/ {
    proxy_pass $wordpress_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /wp-login.php {
    proxy_pass $wordpress_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # El admin de WP no carga estilos/JS/imagenes sin estas dos rutas —
  # se agregan explícitamente porque sin ellas /wp-admin queda roto/sin CSS.
  location /wp-content/ {
    proxy_pass $wordpress_upstream;
    proxy_set_header Host $host;
  }

  location /wp-includes/ {
    proxy_pass $wordpress_upstream;
    proxy_set_header Host $host;
  }

  # --- Sitio Astro (todo lo demás) ------------------------------------
  location / {
    proxy_pass $astro_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
